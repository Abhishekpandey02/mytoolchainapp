name: Build, Push & Run Container

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app1:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/my-app1:latest

    - name: Deploy on EC2 and Run Container
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST_3 }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/my-app1:latest
          docker stop my-container || true
          docker rm my-container || true
          docker run -d -p 80:80 --name my-container --restart always ${{ secrets.DOCKER_USERNAME }}/my-app1:latest

