name: Deploy to Multiple EC2

on:
  push:
    branches:
      - main   # change to master if your repo uses master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Debug Secrets
      run: |
          echo "USER=${{ secrets.EC2_USER }}"
          echo "HOST1=${{ secrets.EC2_HOST_1 }}"
          echo "HOST2=${{ secrets.EC2_HOST_2 }}"
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    - name: Deploy to EC2-1
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_1 }} << 'EOF'
          set -e
          cd /home/ubuntu/mytoolchainapp

          # Update code safely
          git fetch --all
          git reset --hard origin/main

          # Restart containers
          docker-compose down
          docker-compose up --build -d
        EOF

    - name: Deploy to EC2-2
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_2 }} << 'EOF'
          set -e
          cd /home/ubuntu/mytoolchainapp

          # Update code safely
          git fetch --all
          git reset --hard origin/main

          # Restart containers
          docker-compose down
          docker-compose up --build -d
        EOF