name: Deploy to Multiple EC2

on:
  push:
    branches:
      - main   # change to master only if your repo uses master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

    # (Optional but good) add known_hosts to avoid prompts
    - name: Add hosts to known_hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_HOST_1 }} >> ~/.ssh/known_hosts
        ssh-keyscan -H ${{ secrets.EC2_HOST_2 }} >> ~/.ssh/known_hosts

    - name: Deploy to EC2-1
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_1 }} << 'EOF'
          set -e
          cd /home/ubuntu/your-app

          # ensure repo is clean and up-to-date
          git fetch --all
          git reset --hard origin/main   # change to origin/master if using master

          # rebuild & restart
          docker-compose down
          docker-compose up --build -d
        EOF

    - name: Deploy to EC2-2
      run: |
        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_2 }} << 'EOF'
          set -e
          cd /home/ubuntu/your-app

          git fetch --all
          git reset --hard origin/main   # change to origin/master if using master

          docker-compose down
          docker-compose up --build -d
        EOF